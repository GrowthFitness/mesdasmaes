<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Campanha Mês das Mães — Máquina de Matrículas</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:ital,wght@0,900;1,900&family=Barlow:wght@300;400;600&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: #080808;
  font-family: 'Barlow', sans-serif;
  color: #fff;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
}

/* Top accent line */
.top-bar {
  width: 100%;
  height: 3px;
  background: linear-gradient(90deg, transparent, #CC0000, #CC0000, transparent);
}

.container {
  width: 100%;
  max-width: 480px;
  padding: 32px 24px 48px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 28px;
}

/* Header */
.header {
  width: 100%;
  text-align: center;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
}

.overline {
  font-size: 11px;
  font-weight: 300;
  letter-spacing: 4px;
  color: rgba(255,255,255,0.3);
  text-transform: uppercase;
}

.headline {
  font-family: 'Barlow Condensed', sans-serif;
  font-style: italic;
  font-weight: 900;
  font-size: 48px;
  line-height: 0.9;
  text-transform: uppercase;
  color: #fff;
  letter-spacing: -0.5px;
}

.headline span { color: #CC0000; }

.sub {
  font-size: 14px;
  font-weight: 300;
  color: rgba(255,255,255,0.4);
  line-height: 1.6;
  text-align: center;
  max-width: 320px;
}

/* Divider */
.divider {
  width: 40px;
  height: 2px;
  background: linear-gradient(90deg, #CC0000, transparent);
  margin: 0 auto;
}

/* Video */
.video-wrap {
  width: 100%;
  border-radius: 10px;
  overflow: hidden;
  position: relative;
  background: #111;
  aspect-ratio: 16/9;
  border: 1px solid rgba(255,255,255,0.06);
}

.video-wrap iframe {
  width: 100%;
  height: 100%;
  position: absolute;
  top: 0; left: 0;
  border: none;
}

/* Placeholder enquanto sem vídeo */
.video-placeholder {
  width: 100%;
  height: 100%;
  position: absolute;
  top: 0; left: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 12px;
  background: radial-gradient(ellipse at center, rgba(120,6,6,0.3) 0%, transparent 70%);
}

.play-icon {
  width: 56px;
  height: 56px;
  border-radius: 50%;
  border: 2px solid rgba(204,0,0,0.6);
  display: flex;
  align-items: center;
  justify-content: center;
}

.play-icon::after {
  content: '';
  width: 0;
  height: 0;
  border-top: 10px solid transparent;
  border-bottom: 10px solid transparent;
  border-left: 18px solid #CC0000;
  margin-left: 4px;
}

.placeholder-text {
  font-size: 11px;
  letter-spacing: 3px;
  color: rgba(255,255,255,0.2);
  text-transform: uppercase;
}

/* Buttons */
.buttons {
  width: 100%;
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.btn {
  width: 100%;
  padding: 18px 24px;
  border-radius: 6px;
  border: none;
  cursor: pointer;
  font-family: 'Barlow Condensed', sans-serif;
  font-style: italic;
  font-weight: 900;
  font-size: 20px;
  letter-spacing: 1px;
  text-transform: uppercase;
  text-decoration: none;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  transition: opacity 0.2s, transform 0.1s;
}

.btn:active { transform: scale(0.98); opacity: 0.9; }

.btn-checkout {
  background: transparent;
  color: #CC0000;
  border: 1px solid rgba(204,0,0,0.5);
}

.btn-checkout:hover { background: rgba(204,0,0,0.08); }

.btn-whatsapp {
  background: transparent;
  color: #1DB954;
  border: 1px solid rgba(29,185,84,0.4);
}

.btn-whatsapp:hover { background: rgba(29,185,84,0.08); }

.btn svg { flex-shrink: 0; }

/* Footer */
.footer {
  font-size: 10px;
  font-weight: 300;
  letter-spacing: 3px;
  color: rgba(255,255,255,0.15);
  text-transform: uppercase;
  text-align: center;
}
</style>
</head>
