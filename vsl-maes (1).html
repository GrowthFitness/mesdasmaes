<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Mês das Mães</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@800;900&family=Barlow:wght@600&display=swap');

  :root {
    --rose: #D9224E;
    --rose-bright: #FF2D5F;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  body { background: #000; overflow-x: hidden; }

  /* ── DOBRA 1 — VSL FULLSCREEN ── */
  .fold-video {
    width: 100%;
    height: 100svh;
    position: relative;
    background: #000;
    overflow: hidden;
  }
  .fold-video iframe {
    position: absolute;
    top: 0; left: 0;
    width: 100%;
    height: 100%;
    border: none;
  }

  /* seta — começa invisível */
  .scroll-hint {
    position: absolute;
    bottom: 22px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    pointer-events: none;
    z-index: 10;
    opacity: 0;
    transition: opacity .8s ease;
  }
  .scroll-hint.visible {
    opacity: .7;
    animation: bounce 2s ease-in-out infinite;
  }
  .scroll-hint span {
    font-family: 'Barlow Condensed', 'Arial Narrow', sans-serif;
    font-size: .65rem;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: #fff;
  }

  @keyframes bounce {
    0%, 100% { transform: translateX(-50%) translateY(0); opacity: .7; }
    50%       { transform: translateX(-50%) translateY(6px); opacity: .9; }
  }

  /* ── DOBRA 2 — PREÇO + CTA ── */
  .fold-cta {
    width: 100%;
    min-height: 100svh;
    background: #0a0a0a;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 48px 24px 56px;
  }

  .price-block {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 16px;
    margin-bottom: 32px;
  }
  .price-old {
    font-family: 'Barlow Condensed', Impact, 'Arial Narrow', sans-serif;
    font-weight: 800;
    font-size: 1.4rem;
    color: rgba(217,34,78,.3);
    text-decoration: line-through;
    letter-spacing: 1px;
  }
  .price-arrow { color: rgba(217,34,78,.35); font-size: 1.1rem; }

  .price-new-wrap {
    position: relative;
    display: inline-flex;
    align-items: flex-start;
  }
  .price-new {
    font-family: 'Barlow Condensed', Impact, 'Arial Narrow', sans-serif;
    font-weight: 900;
    font-size: clamp(4rem, 18vw, 6rem);
    color: var(--rose-bright);
    line-height: 1;
    letter-spacing: -2px;
  }
  .price-new sup {
    font-size: 38%;
    vertical-align: super;
    font-weight: 900;
    letter-spacing: 0;
  }
  .badge {
    position: absolute;
    top: -10px;
    right: -52px;
    background: rgba(217,34,78,.1);
    border: 1px solid rgba(217,34,78,.3);
    color: var(--rose);
    font-family: 'Barlow', sans-serif;
    font-weight: 600;
    font-size: .58rem;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    padding: 3px 8px;
    border-radius: 20px;
    white-space: nowrap;
  }

  .btn {
    display: block;
    width: 100%;
    max-width: 400px;
    background: var(--rose);
    color: #fff;
    font-family: 'Barlow Condensed', Impact, 'Arial Narrow', sans-serif;
    font-weight: 900;
    font-size: clamp(1.3rem, 5vw, 1.6rem);
    text-transform: uppercase;
    letter-spacing: 3px;
    text-align: center;
    text-decoration: none;
    padding: 20px 24px;
    border-radius: 8px;
    border: none;
    cursor: pointer;
    transition: background .15s, transform .1s;
  }
  .btn:active { background: var(--rose-bright); transform: scale(.98); }
  @media (hover: hover) { .btn:hover { background: var(--rose-bright); } }
</style>
</head>
<body>

<!-- DOBRA 1 — VSL -->
<section class="fold-video">
  <iframe
    src="https://player-vz-d0abe256-8c2.tv.pandavideo.com/embed/?v=83c520c4-419b-44e6-a5b7-945b1b469438"
    allow="accelerometer; gyroscope; autoplay; encrypted-media; picture-in-picture"
    allowfullscreen>
  </iframe>

  <div class="scroll-hint" id="scrollHint">
    <span>deslize</span>
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
      <path d="M12 5v14M5 13l7 7 7-7" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </div>
</section>

<!-- DOBRA 2 — PREÇO + BOTÃO -->
<section class="fold-cta">
  <div class="price-block">
    <span class="price-old">R$ 197</span>
    <span class="price-arrow">→</span>
    <div class="price-new-wrap">
      <span class="price-new"><sup>R$</sup>37</span>
      <span class="badge">81% off</span>
    </div>
  </div>

  <a class="btn" href="https://chk.eduzz.com/1W32DZ3J92" target="_blank">
    Quero garantir agora
  </a>
</section>

<script>
  // Aparece após 3 minutos (180.000ms)
  setTimeout(function () {
    document.getElementById('scrollHint').classList.add('visible');
  }, 180000);
</script>

</body>
</html>
